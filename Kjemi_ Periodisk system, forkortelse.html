<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Periodisk system - Plasser forkortelser i riktig rute</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a1a2a 0%, #0f212f 100%);
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(135deg, #FFE6C7, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #9bb8d4;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255, 180, 70, 0.4);
        }

        .score-box, .round-box, .progress-box {
            background: #00000066;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #FFE3A4;
        }

        .score-box span, .round-box span, .progress-box span {
            font-size: 1.3rem;
            font-weight: 800;
            color: #f9b81b;
        }

        .reset-btn {
            background: #ff8c42;
            border: none;
            color: #1e2a2e;
            font-weight: bold;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #ffa25e;
            transform: scale(0.97);
        }

        .periodic-wrapper {
            background: rgba(20, 35, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            border: 1px solid rgba(255, 200, 100, 0.3);
        }

        .pt-grid {
            display: grid;
            grid-template-columns: repeat(18, minmax(68px, 82px));
            gap: 4px;
            justify-content: center;
            min-width: 800px;
        }

        .element-cell {
            background: #1e2f38;
            border-radius: 8px;
            padding: 6px 2px;
            text-align: center;
            transition: all 0.15s;
            border: 2px solid #3a6a7a;
            cursor: pointer;
            min-height: 70px;
        }

        .element-cell.empty-slot {
            background: #2a3a3f;
            border: 2px dashed #ffb347;
            box-shadow: inset 0 0 8px rgba(255, 180, 70, 0.3);
        }

        .element-cell.completed {
            background: #2b6e3c;
            border-color: #a5d6a5;
            box-shadow: 0 0 8px #6fbf4c;
        }

        .element-cell.active-target {
            border: 3px solid #ffaa33;
            box-shadow: 0 0 12px #ffaa33;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 170, 51, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 170, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 170, 51, 0); }
        }

        .atomic-number {
            font-size: 0.65rem;
            color: #bbccdd;
            font-weight: normal;
        }

        .element-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #f0f0e0;
            margin-top: 2px;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }

        .symbol-display {
            font-size: 1rem;
            font-weight: 800;
            background: #00000055;
            border-radius: 20px;
            padding: 2px 4px;
            display: inline-block;
            margin-top: 3px;
            color: #ffddaa;
        }

        .element-cell.completed .symbol-display {
            background: #3e9e4e;
            color: white;
        }

        .drag-area {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 0.5rem;
            border: 1px solid #ffb34780;
        }

        .drag-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD966;
            margin-bottom: 1rem;
        }

        .drag-items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 0.5rem;
        }

        .drag-symbol {
            background: linear-gradient(145deg, #2c4a3a, #1f3a2a);
            padding: 12px 24px;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            border-radius: 28px;
            cursor: grab;
            border: 2px solid #ffc285;
            color: #fff3cf;
            min-width: 90px;
            transition: 0.1s;
            box-shadow: 0 6px 0 #0f2a1a;
            letter-spacing: 1px;
        }

        .drag-symbol:active {
            cursor: grabbing;
        }

        .drag-symbol.dragging {
            opacity: 0.4;
        }

        .round-feedback {
            text-align: center;
            margin-top: 1rem;
            font-weight: 500;
            color: #ffdd99;
            font-size: 1rem;
            min-height: 50px;
        }

        .next-round-btn {
            background: #3a6b4b;
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: 0.2s;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .next-round-btn:hover:not(:disabled) {
            background: #4e8a5e;
            transform: scale(1.02);
        }

        .next-round-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .group-label {
            font-size: 0.6rem;
            color: #88aacc;
            text-align: center;
            margin-bottom: 5px;
            font-weight: bold;
        }

        @media (max-width: 1000px) {
            .pt-grid {
                grid-template-columns: repeat(18, minmax(55px, 65px));
                gap: 3px;
            }
            .drag-symbol {
                padding: 8px 16px;
                font-size: 1.3rem;
                min-width: 70px;
            }
            .element-name {
                font-size: 0.6rem;
                white-space: normal;
            }
            .symbol-display {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1>⚛️ Periodisk system · Plasser forkortelser ⚛️</h1>
        <div class="sub">Dra forkortelsen til riktig rute i tabellen (atomnummer + navn vises)</div>
    </div>

    <div class="status-bar">
        <div class="score-box">🏆 Riktige: <span id="totalScore">0</span></div>
        <div class="round-box">🔄 Runde #<span id="roundNumber">1</span></div>
        <div class="progress-box">📊 Fullførte: <span id="completedCount">0</span> / <span id="totalElementsCount"></span></div>
        <button class="reset-btn" id="resetGameBtn">🔄 Nytt spill</button>
    </div>

    <div class="periodic-wrapper">
        <div id="periodicGrid" class="pt-grid"></div>
    </div>

    <div class="drag-area" id="dragArea">
        <div class="drag-title">📌 Dra disse 5 forkortelsene til riktig plass i tabellen 📌</div>
        <div id="dragSymbolsList" class="drag-items-container"></div>
        <div class="round-feedback" id="feedbackMsg"></div>
        <button id="nextRoundBtn" class="next-round-btn" disabled>➡️ Neste runde (5 nye)</button>
    </div>
</div>

<script>
    // Complete periodic table data with correct group positions (1-18 from left to right)
    // Main groups: 1,2, then 3-12 (transition), then 13-18
    const elementsData = [
        // Periode 1
        { atomic: 1, name: "Hydrogen", symbol: "H", period: 1, group: 1 },
        { atomic: 2, name: "Helium", symbol: "He", period: 1, group: 18 },
        // Periode 2
        { atomic: 3, name: "Litium", symbol: "Li", period: 2, group: 1 },
        { atomic: 4, name: "Beryllium", symbol: "Be", period: 2, group: 2 },
        { atomic: 5, name: "Bor", symbol: "B", period: 2, group: 13 },
        { atomic: 6, name: "Karbon", symbol: "C", period: 2, group: 14 },
        { atomic: 7, name: "Nitrogen", symbol: "N", period: 2, group: 15 },
        { atomic: 8, name: "Oksygen", symbol: "O", period: 2, group: 16 },
        { atomic: 9, name: "Fluor", symbol: "F", period: 2, group: 17 },
        { atomic: 10, name: "Neon", symbol: "Ne", period: 2, group: 18 },
        // Periode 3
        { atomic: 11, name: "Natrium", symbol: "Na", period: 3, group: 1 },
        { atomic: 12, name: "Magnesium", symbol: "Mg", period: 3, group: 2 },
        { atomic: 13, name: "Aluminium", symbol: "Al", period: 3, group: 13 },
        { atomic: 14, name: "Silisium", symbol: "Si", period: 3, group: 14 },
        { atomic: 15, name: "Fosfor", symbol: "P", period: 3, group: 15 },
        { atomic: 16, name: "Svovel", symbol: "S", period: 3, group: 16 },
        { atomic: 17, name: "Klor", symbol: "Cl", period: 3, group: 17 },
        { atomic: 18, name: "Argon", symbol: "Ar", period: 3, group: 18 },
        // Periode 4 (med overgangsmetaller)
        { atomic: 19, name: "Kalium", symbol: "K", period: 4, group: 1 },
        { atomic: 20, name: "Kalsium", symbol: "Ca", period: 4, group: 2 },
        { atomic: 21, name: "Scandium", symbol: "Sc", period: 4, group: 3 },
        { atomic: 22, name: "Titan", symbol: "Ti", period: 4, group: 4 },
        { atomic: 23, name: "Vanadium", symbol: "V", period: 4, group: 5 },
        { atomic: 24, name: "Krom", symbol: "Cr", period: 4, group: 6 },
        { atomic: 25, name: "Mangan", symbol: "Mn", period: 4, group: 7 },
        { atomic: 26, name: "Jern", symbol: "Fe", period: 4, group: 8 },
        { atomic: 27, name: "Kobolt", symbol: "Co", period: 4, group: 9 },
        { atomic: 28, name: "Nikkel", symbol: "Ni", period: 4, group: 10 },
        { atomic: 29, name: "Kobber", symbol: "Cu", period: 4, group: 11 },
        { atomic: 30, name: "Sink", symbol: "Zn", period: 4, group: 12 },
        { atomic: 31, name: "Gallium", symbol: "Ga", period: 4, group: 13 },
        { atomic: 32, name: "Germanium", symbol: "Ge", period: 4, group: 14 },
        { atomic: 33, name: "Arsen", symbol: "As", period: 4, group: 15 },
        { atomic: 34, name: "Selen", symbol: "Se", period: 4, group: 16 },
        { atomic: 35, name: "Brom", symbol: "Br", period: 4, group: 17 },
        { atomic: 36, name: "Krypton", symbol: "Kr", period: 4, group: 18 },
        // Periode 5
        { atomic: 37, name: "Rubidium", symbol: "Rb", period: 5, group: 1 },
        { atomic: 38, name: "Strontium", symbol: "Sr", period: 5, group: 2 },
        { atomic: 39, name: "Yttrium", symbol: "Y", period: 5, group: 3 },
        { atomic: 40, name: "Zirkonium", symbol: "Zr", period: 5, group: 4 },
        { atomic: 41, name: "Niob", symbol: "Nb", period: 5, group: 5 },
        { atomic: 42, name: "Molybden", symbol: "Mo", period: 5, group: 6 },
        { atomic: 43, name: "Technetium", symbol: "Tc", period: 5, group: 7 },
        { atomic: 44, name: "Rutenium", symbol: "Ru", period: 5, group: 8 },
        { atomic: 45, name: "Rhodium", symbol: "Rh", period: 5, group: 9 },
        { atomic: 46, name: "Palladium", symbol: "Pd", period: 5, group: 10 },
        { atomic: 47, name: "Sølv", symbol: "Ag", period: 5, group: 11 },
        { atomic: 48, name: "Kadmium", symbol: "Cd", period: 5, group: 12 },
        { atomic: 49, name: "Indium", symbol: "In", period: 5, group: 13 },
        { atomic: 50, name: "Tinn", symbol: "Sn", period: 5, group: 14 },
        { atomic: 51, name: "Antimon", symbol: "Sb", period: 5, group: 15 },
        { atomic: 52, name: "Tellur", symbol: "Te", period: 5, group: 16 },
        { atomic: 53, name: "Jod", symbol: "I", period: 5, group: 17 },
        { atomic: 54, name: "Xenon", symbol: "Xe", period: 5, group: 18 },
        // Periode 6 (forenklet - viktigste)
        { atomic: 55, name: "Cesium", symbol: "Cs", period: 6, group: 1 },
        { atomic: 56, name: "Barium", symbol: "Ba", period: 6, group: 2 },
        { atomic: 57, name: "Lantan", symbol: "La", period: 6, group: 3 },
        { atomic: 72, name: "Hafnium", symbol: "Hf", period: 6, group: 4 },
        { atomic: 73, name: "Tantal", symbol: "Ta", period: 6, group: 5 },
        { atomic: 74, name: "Wolfram", symbol: "W", period: 6, group: 6 },
        { atomic: 75, name: "Rhenium", symbol: "Re", period: 6, group: 7 },
        { atomic: 76, name: "Osmium", symbol: "Os", period: 6, group: 8 },
        { atomic: 77, name: "Iridium", symbol: "Ir", period: 6, group: 9 },
        { atomic: 78, name: "Platina", symbol: "Pt", period: 6, group: 10 },
        { atomic: 79, name: "Gull", symbol: "Au", period: 6, group: 11 },
        { atomic: 80, name: "Kvikksølv", symbol: "Hg", period: 6, group: 12 },
        { atomic: 81, name: "Tallium", symbol: "Tl", period: 6, group: 13 },
        { atomic: 82, name: "Bly", symbol: "Pb", period: 6, group: 14 },
        { atomic: 83, name: "Vismut", symbol: "Bi", period: 6, group: 15 },
        { atomic: 84, name: "Polonium", symbol: "Po", period: 6, group: 16 },
        { atomic: 85, name: "Astat", symbol: "At", period: 6, group: 17 },
        { atomic: 86, name: "Radon", symbol: "Rn", period: 6, group: 18 }
    ];

    // Game state
    let completedElements = new Set();
    let totalCorrect = 0;
    let currentRound = 1;
    let currentChallengeElements = [];
    let activeDragItems = [];
    let dragData = { active: false, symbol: null, atomic: null, element: null };

    const totalElementsCountSpan = document.getElementById("totalElementsCount");
    const totalScoreSpan = document.getElementById("totalScore");
    const completedCountSpan = document.getElementById("completedCount");
    const roundNumberSpan = document.getElementById("roundNumber");
    const periodicGridDiv = document.getElementById("periodicGrid");
    const dragSymbolsContainer = document.getElementById("dragSymbolsList");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");
    const nextRoundBtn = document.getElementById("nextRoundBtn");
    const resetBtn = document.getElementById("resetGameBtn");

    // Render full periodic table with correct group positions (left to right)
    function renderPeriodicTable() {
        periodicGridDiv.innerHTML = "";
        
        for (let period = 1; period <= 6; period++) {
            for (let group = 1; group <= 18; group++) {
                const element = elementsData.find(el => el.period === period && el.group === group);
                
                if (element) {
                    const isCompleted = completedElements.has(element.atomic);
                    const isInCurrentRound = currentChallengeElements.some(e => e.atomic === element.atomic && !e.placed);
                    
                    const cell = document.createElement("div");
                    cell.className = "element-cell";
                    if (isCompleted) cell.classList.add("completed");
                    if (isInCurrentRound && !isCompleted) cell.classList.add("empty-slot", "active-target");
                    
                    cell.setAttribute("data-atomic", element.atomic);
                    cell.setAttribute("data-symbol", element.symbol);
                    cell.setAttribute("data-name", element.name);
                    
                    const symbolHtml = isCompleted ? 
                        `<div class="symbol-display">${element.symbol}</div>` : 
                        `<div class="symbol-display">⬚ ⬚</div>`;
                    
                    cell.innerHTML = `
                        <div class="atomic-number">${element.atomic}</div>
                        <div class="element-name">${element.name}</div>
                        ${symbolHtml}
                    `;
                    
                    // Drop event listeners
                    cell.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = "move";
                    });
                    
                    cell.addEventListener("drop", (e) => {
                        e.preventDefault();
                        handleDrop(element);
                    });
                    
                    periodicGridDiv.appendChild(cell);
                } else {
                    // Empty cell for positions without elements
                    const emptyCell = document.createElement("div");
                    emptyCell.className = "element-cell";
                    emptyCell.style.background = "rgba(30,40,50,0.2)";
                    emptyCell.style.border = "1px solid #2a4a5a";
                    emptyCell.style.opacity = "0.5";
                    emptyCell.innerHTML = "";
                    periodicGridDiv.appendChild(emptyCell);
                }
            }
        }
    }
    
    // Handle drop on element cell
    function handleDrop(element) {
        if (!dragData.active || !dragData.symbol) {
            feedbackMsgDiv.innerHTML = "⚠️ Dra en forkortelse fra listen under tabellen!";
            return;
        }
        
        if (completedElements.has(element.atomic)) {
            feedbackMsgDiv.innerHTML = `❌ ${element.name} er allerede riktig plassert!`;
            resetDragState();
            return;
        }
        
        const challengeItem = currentChallengeElements.find(e => e.atomic === element.atomic && !e.placed);
        if (!challengeItem) {
            feedbackMsgDiv.innerHTML = `⚠️ "${element.name}" er ikke i denne rundens 5 elementer. Fullfør de som er uthevet!`;
            resetDragState();
            return;
        }
        
        if (dragData.symbol === element.symbol) {
            // Correct match
            challengeItem.placed = true;
            completedElements.add(element.atomic);
            totalCorrect++;
            
            activeDragItems = activeDragItems.filter(item => item.atomic !== dragData.atomic);
            
            updateStats();
            renderPeriodicTable();
            renderDragSymbols();
            
            feedbackMsgDiv.innerHTML = `✅ Riktig! ${element.name} (${element.symbol}) plassert riktig! 🎉`;
            
            const allPlaced = currentChallengeElements.every(e => e.placed === true);
            if (allPlaced) {
                feedbackMsgDiv.innerHTML = `🏆 Runde ${currentRound} fullført! Trykk "Neste runde" for nye utfordringer. 🏆`;
                nextRoundBtn.disabled = false;
            }
        } else {
            feedbackMsgDiv.innerHTML = `❌ Feil! "${dragData.symbol}" er ikke forkortelsen for ${element.name}. Prøv igjen!`;
            
            const cell = document.querySelector(`.element-cell[data-atomic="${element.atomic}"]`);
            if (cell) {
                cell.style.transform = "translateX(4px)";
                setTimeout(() => { if(cell) cell.style.transform = ""; }, 150);
            }
        }
        
        resetDragState();
    }
    
    function resetDragState() {
        dragData = { active: false, symbol: null, atomic: null, element: null };
    }
    
    function updateStats() {
        totalScoreSpan.innerText = totalCorrect;
        completedCountSpan.innerText = completedElements.size;
        roundNumberSpan.innerText = currentRound;
    }
    
    // Render draggable symbols
    function renderDragSymbols() {
        dragSymbolsContainer.innerHTML = "";
        
        if (activeDragItems.length === 0) {
            if (currentChallengeElements.length > 0 && currentChallengeElements.every(e => e.placed)) {
                const msgDiv = document.createElement("div");
                msgDiv.style.textAlign = "center";
                msgDiv.style.color = "#aaffaa";
                msgDiv.style.padding = "20px";
                msgDiv.innerHTML = "✨ Alle 5 forkortelsene er plassert! Klikk 'Neste runde' ✨";
                dragSymbolsContainer.appendChild(msgDiv);
            }
            return;
        }
        
        activeDragItems.forEach(item => {
            const dragDiv = document.createElement("div");
            dragDiv.className = "drag-symbol";
            dragDiv.setAttribute("data-symbol", item.symbol);
            dragDiv.setAttribute("data-atomic", item.atomic);
            dragDiv.textContent = item.symbol;
            dragDiv.draggable = true;
            
            dragDiv.addEventListener("dragstart", (e) => {
                dragData = {
                    active: true,
                    symbol: item.symbol,
                    atomic: item.atomic,
                    element: dragDiv
                };
                e.dataTransfer.setData("text/plain", item.symbol);
                e.dataTransfer.effectAllowed = "move";
                dragDiv.classList.add("dragging");
            });
            
            dragDiv.addEventListener("dragend", (e) => {
                dragDiv.classList.remove("dragging");
                if (dragData.element === dragDiv) {
                    resetDragState();
                }
            });
            
            dragSymbolsContainer.appendChild(dragDiv);
        });
    }
    
    // Generate new round with 5 random uncompleted elements
    function generateNewRound() {
        const notCompleted = elementsData.filter(el => !completedElements.has(el.atomic));
        
        if (notCompleted.length === 0) {
            feedbackMsgDiv.innerHTML = "🎉 GRATULERER! Du har fullført hele periodiske systemet! 🎉";
            nextRoundBtn.disabled = true;
            dragSymbolsContainer.innerHTML = "<div style='text-align:center; color:#aaffaa; padding:20px;'>🌟 Fullført - Du er en mester i periodisk system! 🌟</div>";
            return false;
        }
        
        // Shuffle and pick up to 5 elements
        const shuffled = [...notCompleted];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        const takeCount = Math.min(5, shuffled.length);
        const selected = shuffled.slice(0, takeCount);
        
        currentChallengeElements = selected.map(el => ({
            atomic: el.atomic,
            symbol: el.symbol,
            name: el.name,
            placed: false
        }));
        
        activeDragItems = currentChallengeElements.map(el => ({
            atomic: el.atomic,
            symbol: el.symbol
        }));
        
        // Shuffle active drag items for better gameplay
        for (let i = activeDragItems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [activeDragItems[i], activeDragItems[j]] = [activeDragItems[j], activeDragItems[i]];
        }
        
        renderPeriodicTable();
        renderDragSymbols();
        
        feedbackMsgDiv.innerHTML = `🔬 Runde ${currentRound}: Plasser disse ${activeDragItems.length} forkortelsene i de uthevede rutene! 🔬`;
        nextRoundBtn.disabled = true;
        
        return true;
    }
    
    // Go to next round
    function nextRound() {
        const allPlaced = currentChallengeElements.every(e => e.placed === true);
        if (!allPlaced) {
            feedbackMsgDiv.innerHTML = "⚠️ Du må plassere alle 5 forkortelsene før du går til neste runde!";
            return;
        }
        
        const remaining = elementsData.filter(el => !completedElements.has(el.atomic));
        if (remaining.length === 0) {
            feedbackMsgDiv.innerHTML = "🏆 Gratulerer! Du har fullført hele spillet! 🏆";
            nextRoundBtn.disabled = true;
            return;
        }
        
        currentRound++;
        generateNewRound();
    }
    
    // Reset entire game
    function resetGame() {
        completedElements.clear();
        totalCorrect = 0;
        currentRound = 1;
        currentChallengeElements = [];
        activeDragItems = [];
        resetDragState();
        
        updateStats();
        generateNewRound();
        feedbackMsgDiv.innerHTML = "Spillet er tilbakestilt! Dra forkortelsene til riktig rute i tabellen.";
    }
    
    // Initialize
    totalElementsCountSpan.innerText = elementsData.length;
    resetGame();
    
    // Event listeners
    nextRoundBtn.addEventListener("click", nextRound);
    resetBtn.addEventListener("click", resetGame);
    
    // Prevent default drag on page
    window.addEventListener("dragstart", (e) => {
        if (!e.target.closest(".drag-symbol")) {
            e.preventDefault();
        }
    });
</script>
